
[env:uwb]
platform  = espressif32
board = esp32-c3-devkitm-1
framework = arduino

board_build.flash_mode = dio
board_build.f_flash    = 80000000L
board_build.partitions = default.csv

monitor_speed = 115200

build_flags =
    -DARDUINO_USB_MODE=1           
    -DARDUINO_USB_CDC_ON_BOOT=1 
    -DCORE_DEBUG_LEVEL=1
